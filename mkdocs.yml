site_name: "Dependency-Track"
site_url: "https://dependencytrack.github.io/docs/"
docs_dir: docs
copyright: "Copyright &copy; OWASP Foundation. All Rights Reserved."

theme:
  name: material
  features:
  - content.code.copy
  - navigation.tabs
  - navigation.sections
  - navigation.top

extra:
  version:
    provider: mike
    default: latest
  social:
  - icon: fontawesome/brands/slack
    link: https://dependencytrack.org/slack
  - icon: fontawesome/brands/github
    link: https://github.com/DependencyTrack
  - icon: fontawesome/brands/docker
    link: https://hub.docker.com/u/dependencytrack

markdown_extensions:
- abbr
- admonition
- attr_list
- md_in_html
- toc:
    permalink: true
- pymdownx.details
- pymdownx.snippets:
    auto_append:
    - docs/includes/abbreviations.md
- pymdownx.superfences
- pymdownx.tabbed

plugins:
- search
- social
- awesome-pages
- blog:
    categories_allowed:
    - Release
    - Engineering
    - Community
- rss:
    match_path: blog/posts/.*
    date_from_meta:
      as_creation: date
    categories:
    - categories
    - tags
- swagger-ui-tag:
    filter: true
    supportedSubmitMethods: []
