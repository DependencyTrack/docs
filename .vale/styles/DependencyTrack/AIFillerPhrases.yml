extends: existence
message: "Avoid filler phrase '%s'. Be direct."
ignorecase: true
level: warning
tokens:
- it is important to note
- it is worth noting
- it's important to note
- it's worth noting
- it should be noted
- it bears mentioning
- this is because
- this means that
- this is due to the fact
- as mentioned earlier
- as noted above
- as previously mentioned
- as discussed
- at the end of the day
- in today's world
- when it comes to
- plays a crucial role
- plays a vital role
- plays an important role
- plays a key role
