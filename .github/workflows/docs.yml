name: docs

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+", "[0-9]+.[0-9]+.[0-9]+-*"]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Install imaging dependencies
      run: >-
        sudo apt-get install -y --no-install-recommends
        libcairo2-dev libfreetype6-dev libffi-dev
        libjpeg-dev libpng-dev libz-dev
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: false
    - name: Lint Markdown
      run: make lint-markdown
    - name: Lint YAML
      run: make lint-yaml
    - name: Lint prose
      run: make lint-prose
    - name: Lint Python
      run: make lint-python
    - name: Build
      run: make build

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Configure git
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Install imaging dependencies
      run: >-
        sudo apt-get install -y --no-install-recommends
        libcairo2-dev libfreetype6-dev libffi-dev
        libjpeg-dev libpng-dev libz-dev
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: false
    - name: Lint
      run: make lint
    - name: Deploy next
      if: github.ref == 'refs/heads/main'
      run: uv run mike deploy --push next
    - name: Deploy release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        if [[ "$TAG" == *-* ]]; then
          uv run mike deploy --push "$TAG"
        else
          MINOR="${TAG%.*}"
          uv run mike deploy --push --update-aliases "$MINOR" latest
          uv run mike set-default --push latest
        fi
